[defaults]
host_key_checking = False
inventory=/etc/ansible/inventory.yml
#interpreter_python=auto_silent
ansible_python_interpreter=/usr/bin/python3
localhost_warning=false
# EOM
# Older Ansible versions (still widely used)
# callback_whitelist = foreman
# For Ansible 2.10+ / newer versions
callbacks_enabled = theforeman.foreman.foreman
log_path=/var/log/ansible/ansible.log
#vault_password_file = /etc/ansible/.vault_pass
vault_password_file = /home/emanners/Documents/Code/ansible/.vault_pass

[callback_foreman]
#url = https://foremanctl.edsonmanners.com
url = https://katello.edsonmanners.com
#url = 'https://192.168.70.105'

# Certificate-based authentication (recommended for Satellite/Foreman)
#ssl_cert = /etc/foreman-proxy/ssl_cert.pem
#ssl_key = /etc/foreman-proxy/ssl_key.pem
ssl_cert = /etc/foreman/client_cert.pem
ssl_key = /etc/foreman/client_key.pem

#Certificate verification
#verify_certs = /etc/foreman-proxy/ssl_ca.pem
verify_certs = /etc/foreman/proxy_ca.pem
#verify_certs = 0	# Disable verification (not recommended for production)

# Optional: Report type (foreman or proxy)
report_type = foreman

[ssh_connection]
#ssh_args = 
