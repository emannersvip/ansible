---
# tasks file for roles/slurm
# We expect the deb_repos role to have already been run at this point
# They are configured in the meta/main.yml file for this role

- name: 'Install SLURM controller DEBs file from Katello'
  ansible.builtin.apt:
    name:
      - slurm-smd
      - slurm-smd-client
      - slurm-smd-slurmctld
    state: present
    update_cache: true
