---

# https://docs.ansible.com/projects/ansible/latest/collections/theforeman/foreman/operatingsystem_module.html
- name: "Create the Rocky 9 OperatingSystem"
  theforeman.foreman.operatingsystem:
    name: "Rocky_Linux"
    major: 9
    description: "Rocky 9"
    family: Redhat
    architectures:
      - "x86_64"
    ptables:
      - "Kickstart default"
    media:
      - "Rocky Linux"
    state: present
    #
    server_url: "https://{{ foreman_server }}"
    username: "ansible"
    password: "{{ ansible_user_pass }}"
    validate_certs: false

- name: "Create the Debian 12 Bookworm OperatingSystem"
  theforeman.foreman.operatingsystem:
    name: "Debian"
    major: 12
    minor: 14
    description: "Debian 12 Bookworm"
    family: Debian
    release_name: "bookworm"
    architectures:
      - "aarch64"
    ptables:
      - "Preseed default"
    media:
      - "Debian mirror"
    state: present
    #
    server_url: "https://{{ foreman_server }}"
    username: "ansible"
    password: "{{ ansible_user_pass }}"
    validate_certs: false