# https://docs.ansible.com/projects/ansible/latest/collections/theforeman/foreman/installation_medium_module.html
# Rocky Linux media entry exists out of the box in 3.19
- name: "Create Rocky Hostgroup"
  theforeman.foreman.hostgroup:
    name: "Rocky Linux"
    architecture: "x86_64"
    operatingsystem: "Rocky_Linux 9"
